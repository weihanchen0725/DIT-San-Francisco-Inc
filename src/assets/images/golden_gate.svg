<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <title>3D Golden Gate Bridge - Majestic Proportions, 12° Tilt</title>
  
  <g transform="translate(100, 100) rotate(12, 500, 250)">
    
    <defs>
      <pattern id="susp-front" width="10" height="400" patternUnits="userSpaceOnUse">
        <rect x="0" y="0" width="1.5" height="400" fill="#DE2D2D"/>
      </pattern>
      <pattern id="susp-back" width="10" height="400" patternUnits="userSpaceOnUse">
        <rect x="0" y="0" width="1.5" height="400" fill="#9B0000"/>
      </pattern>

      <pattern id="truss-front" width="16" height="8" patternUnits="userSpaceOnUse">
        <path d="M 0 0 L 8 8 L 16 0" fill="none" stroke="#9B0000" stroke-width="1.5"/>
        <path d="M 8 0 L 8 8" fill="none" stroke="#9B0000" stroke-width="1.5"/>
      </pattern>
      <pattern id="truss-back" width="16" height="8" patternUnits="userSpaceOnUse">
        <path d="M 0 0 L 8 8 L 16 0" fill="none" stroke="#660000" stroke-width="1.5"/>
        <path d="M 8 0 L 8 8" fill="none" stroke="#660000" stroke-width="1.5"/>
      </pattern>

      <g id="back-leg">
        <rect x="65" y="-45" width="16" height="460" fill="#C21B1B"/>
        <polygon points="81,-45 98,-70 98,390 81,415" fill="#9B0000"/> <polygon points="65,-45 81,-45 98,-70 82,-70" fill="#E63946"/> <rect x="63" y="-55" width="20" height="10" fill="#C21B1B"/>
        <polygon points="83,-55 100,-80 100,-70 83,-45" fill="#9B0000"/>
        <polygon points="63,-55 83,-55 100,-80 80,-80" fill="#E63946"/>
      </g>
      
      <g id="cross-struts">
        <polygon points="8,0 65,-25 65,-15 8,10" fill="#A80404"/>
        <polygon points="8,60 65,35 65,45 8,70" fill="#A80404"/>
        <polygon points="8,120 65,95 65,105 8,130" fill="#A80404"/>
        <polygon points="8,180 65,155 65,165 8,190" fill="#A80404"/>
        <polygon points="8,280 65,255 65,265 8,290" fill="#A80404"/>
        <polygon points="8,340 65,315 65,325 8,350" fill="#A80404"/>
        <polygon points="8,400 65,375 65,385 8,410" fill="#A80404"/>
      </g>
      
      <g id="front-leg">
        <rect x="-8" y="-20" width="16" height="460" fill="#FF4D4D"/>
        <polygon points="8,-20 25,-45 25,415 8,440" fill="#C21B1B"/> <polygon points="-8,-20 8,-20 25,-45 9,-45" fill="#FF9A8B"/> <rect x="-10" y="-30" width="20" height="10" fill="#FF4D4D"/>
        <polygon points="10,-30 27,-55 27,-45 10,-20" fill="#C21B1B"/>
        <polygon points="-10,-30 10,-30 27,-55 7,-55" fill="#FF9A8B"/>
        <line x1="-3" y1="-20" x2="-3" y2="440" stroke="#C21B1B" stroke-width="1.5"/>
        <line x1="3" y1="-20" x2="3" y2="440" stroke="#C21B1B" stroke-width="1.5"/>
      </g>
    </defs>

    <path d="M 73 225 Q 173 175 273 -45 L 273 225 Z" fill="url(#susp-back)"/>
    <path d="M 273 -45 Q 573 515 873 -45 L 873 225 L 273 225 Z" fill="url(#susp-back)"/>
    <path d="M 873 -45 Q 973 175 1073 225 L 873 225 Z" fill="url(#susp-back)"/>
    
    <path d="M 73 225 Q 173 175 273 -45" fill="none" stroke="#660000" stroke-width="4"/>
    <path d="M 273 -45 Q 573 515 873 -45" fill="none" stroke="#660000" stroke-width="4"/>
    <path d="M 873 -45 Q 973 175 1073 225" fill="none" stroke="#660000" stroke-width="4"/>

    <rect x="73" y="225" width="1000" height="8" fill="#9B0000"/>
    <rect x="73" y="225" width="1000" height="8" fill="url(#truss-back)"/>

    <use href="#back-leg" x="200" y="0"/>
    <use href="#back-leg" x="800" y="0"/>

    <polygon points="0,259.5 1000,259.5 1073,233 73,233" fill="#15171A"/>
    
    <polygon points="0,251.5 1000,251.5 1073,225 73,225" fill="#464C58"/>
    
    <line x1="36.5" y1="238.25" x2="1036.5" y2="238.25" stroke="#F4B41A" stroke-width="2" stroke-dasharray="12 8"/>
    
    <rect x="0" y="251.5" width="1000" height="1.5" fill="#9FA4BE"/>

    <rect x="0" y="251.5" width="1000" height="8" fill="#DE2D2D"/>
    <rect x="0" y="251.5" width="1000" height="8" fill="url(#truss-front)"/>
    
    <rect x="0" y="259.5" width="1000" height="2" fill="#A80404"/>

    <use href="#cross-struts" x="200" y="0"/>
    <use href="#cross-struts" x="800" y="0"/>

    <use href="#front-leg" x="200" y="0"/>
    <use href="#front-leg" x="800" y="0"/>

    <path d="M 0 250 Q 100 200 200 -20 L 200 250 Z" fill="url(#susp-front)"/>
    <path d="M 200 -20 Q 500 540 800 -20 L 800 250 L 200 250 Z" fill="url(#susp-front)"/>
    <path d="M 800 -20 Q 900 200 1000 250 L 800 250 Z" fill="url(#susp-front)"/>

    <path d="M 0 250 Q 100 200 200 -20" fill="none" stroke="#A80404" stroke-width="5"/>
    <path d="M 200 -20 Q 500 540 800 -20" fill="none" stroke="#A80404" stroke-width="5"/>
    <path d="M 800 -20 Q 900 200 1000 250" fill="none" stroke="#A80404" stroke-width="5"/>
    
    <path d="M 0 250 Q 100 200 200 -20" fill="none" stroke="#FF4D4D" stroke-width="2.5" transform="translate(0, -1.5)"/>
    <path d="M 200 -20 Q 500 540 800 -20" fill="none" stroke="#FF4D4D" stroke-width="2.5" transform="translate(0, -1.5)"/>
    <path d="M 800 -20 Q 900 200 1000 250" fill="none" stroke="#FF4D4D" stroke-width="2.5" transform="translate(0, -1.5)"/>

  </g>
</svg>