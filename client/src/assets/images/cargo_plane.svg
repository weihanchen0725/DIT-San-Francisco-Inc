<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 332 332" width="332" height="332" preserveAspectRatio="xMidYMid meet">
  <title>Detailed Cargo Plane - 22.5 Degree Nose Up</title>
  <defs>
    <pattern id="rivet-line-h" width="20" height="2" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="1" r="1.5" fill="#A0A0A0"/>
      <circle cx="12" cy="1" r="1.5" fill="#A0A0A0"/>
    </pattern>
    
    <linearGradient id="fuselage-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="50%" style="stop-color:#F8F9FA"/>
      <stop offset="100%" style="stop-color:#E9ECEF"/>
    </linearGradient>
    
    <pattern id="fan-blades" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(15 5 5)">
       <path d="M5,0 L6,5 L5,10 L4,5 Z" fill="#495057"/>
    </pattern>
  </defs>

  <g transform="translate(166, 166) scale(0.33) rotate(22.5) translate(-500, -250)">
    
    <g id="fuselage-group">
      <path d="M 120 220 C 80 220, 50 240, 50 265 C 50 290, 80 310, 120 310 L 850 310 C 900 310, 930 290, 960 240 L 930 220 L 120 220 Z" fill="url(#fuselage-grad)" stroke="#CED4DA" stroke-width="1.25"/>
      
      <path d="M 250 310 L 750 310 C 780 310, 800 320, 810 325 L 190 325 C 200 320, 220 310, 250 310 Z" fill="#DEE2E6"/>

      <g id="cockpit">
        <path d="M 115 230 L 155 230 L 160 245 L 110 245 Z" fill="#343A40"/>
        <path d="M 160 230 L 185 230 L 188 245 L 165 245 Z" fill="#343A40"/>
        <path d="M 115 230 L 155 230 L 160 245 L 110 245 Z" fill="none" stroke="#CED4DA" stroke-width="3.75"/>
        <path d="M 160 230 L 185 230 L 188 245 L 165 245 Z" fill="none" stroke="#CED4DA" stroke-width="3.75"/>
        <line x1="158" y1="230" x2="163" y2="245" stroke="#CED4DA" stroke-width="3.75"/>
      </g>

      <rect x="220" y="230" width="100" height="65" rx="5" fill="none" stroke="#ADB5BD" stroke-width="2.5"/>
      <rect x="220" y="230" width="100" height="65" rx="5" fill="url(#rivet-line-h)" opacity="0.4"/>
      <line x1="270" y1="230" x2="270" y2="295" stroke="#ADB5BD" stroke-width="1.25"/> <circle cx="230" cy="262.5" r="4" fill="#ADB5BD"/> <rect x="340" y="300" width="60" height="20" rx="3" fill="none" stroke="#ADB5BD" stroke-width="2.5"/>
      <rect x="680" y="300" width="60" height="20" rx="3" fill="none" stroke="#ADB5BD" stroke-width="2.5"/>

      <line x1="190" y1="220" x2="190" y2="310" stroke="#CED4DA" stroke-width="1.25" stroke-dasharray="8 4"/>
      <line x1="330" y1="220" x2="330" y2="310" stroke="#CED4DA" stroke-width="1.25" stroke-dasharray="8 4"/>
      <line x1="470" y1="220" x2="470" y2="310" stroke="#CED4DA" stroke-width="1.25" stroke-dasharray="8 4"/>
      <line x1="660" y1="220" x2="660" y2="310" stroke="#CED4DA" stroke-width="1.25" stroke-dasharray="8 4"/>
      <path d="M 280 220 L 285 205 L 290 220 Z" fill="#CED4DA"/>
      <path d="M 600 220 C 600 210, 640 210, 640 220 Z" fill="#CED4DA"/>
      
      <path d="M 930 220 L 960 240 C 970 250, 970 270, 960 280 L 850 310" fill="none" stroke="#CED4DA" stroke-width="1.25"/>
      <circle cx="965" cy="260" r="5" fill="#495057"/> <text x="800" y="255" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#495057">N123CG</text>
      <text x="500" y="255" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#0056b3" letter-spacing="3">GLOBAL CARGO</text>
      <rect x="870" y="235" width="30" height="20" fill="#0056b3"/> </g>

    <g id="wings-tail">
      <path d="M 820 220 L 940 220 L 970 50 L 870 50 Z" fill="#0056b3"/>
      <path d="M 940 220 L 970 50" stroke="#004494" stroke-width="2.5"/> <line x1="870" y1="90" x2="965" y2="90" stroke="#004494" stroke-width="1.25"/> <line x1="850" y1="150" x2="955" y2="150" stroke="#004494" stroke-width="1.25"/> <path d="M 870 280 L 980 280 L 995 295 L 890 295 Z" fill="#E9ECEF" stroke="#CED4DA" stroke-width="1.25"/>
      <line x1="890" y1="290" x2="990" y2="290" stroke="#ADB5BD" stroke-width="2.5"/> <path d="M 980 280 L 995 295" fill="none" stroke="#ADB5BD" stroke-width="1.25"/> <path d="M 450 230 L 700 230 L 800 260 L 500 260 Z" fill="#DEE2E6" stroke="#CED4DA" stroke-width="1.25"/>
    </g>

    <g id="engines">
      <g transform="translate(620, 275) scale(0.9)">
        <rect x="-20" y="-10" width="40" height="15" fill="#DEE2E6"/> <ellipse cx="0" cy="15" rx="45" ry="25" fill="#DEE2E6" stroke="#ADB5BD" stroke-width="1.25"/> <circle cx="0" cy="15" r="20" fill="#6C757D"/> <circle cx="0" cy="15" r="15" fill="#343A40"/> </g>

      <path d="M 350 220 L 650 220 L 780 270 L 380 270 Z" fill="#F8F9FA" stroke="#CED4DA" stroke-width="1.25"/>
      <line x1="380" y1="265" x2="770" y2="265" stroke="#ADB5BD" stroke-width="2.5"/> <line x1="450" y1="225" x2="650" y2="225" stroke="#ADB5BD" stroke-width="2.5"/> <line x1="500" y1="220" x2="510" y2="268" stroke="#CED4DA" stroke-width="1.25"/> <line x1="600" y1="220" x2="620" y2="268" stroke="#CED4DA" stroke-width="1.25"/> <path d="M 780 270 L 790 245 L 805 265 Z" fill="#0056b3"/>

      <g transform="translate(500, 280)">
        <rect x="-25" y="-10" width="50" height="20" fill="#F8F9FA" stroke="#CED4DA" stroke-width="1.25"/>
        <line x1="0" y1="-10" x2="0" y2="10" stroke="#CED4DA" stroke-width="1.25"/>
        
        <ellipse cx="0" cy="25" rx="55" ry="35" fill="url(#fuselage-grad)" stroke="#ADB5BD" stroke-width="1.25"/>
        <path d="M -45 25 L -55 35 L 45 35 L 35 25 Z" fill="#DEE2E6"/> <circle cx="0" cy="25" r="30" fill="#E9ECEF" stroke="#CED4DA" stroke-width="2.5"/> <circle cx="0" cy="25" r="25" fill="#343A40"/> <circle cx="0" cy="25" r="25" fill="url(#fan-blades)" opacity="0.5"/> <circle cx="0" cy="25" r="6" fill="#6C757D"/> <circle cx="0" cy="25" r="2" fill="#F8F9FA"/> <line x1="-30" y1="-5" x2="-30" y2="55" stroke="#CED4DA" stroke-width="1.25"/>
        <line x1="30" y1="-5" x2="30" y2="55" stroke="#CED4DA" stroke-width="1.25"/>
        <rect x="-10" y="50" width="20" height="5" fill="#CED4DA"/> <path d="M 45 25 L 65 15 L 65 35 L 45 25 Z" fill="#6C757D"/> <path d="M 50 5 L 60 5 L 65 15 L 65 35 L 60 45 L 50 45 Z" fill="#ADB5BD"/> </g>
    </g>
